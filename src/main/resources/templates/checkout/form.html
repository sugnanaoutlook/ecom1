<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Checkout - ShopEasy</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<nav class="navbar">
    <div class="container nav-container">
        <a href="/" class="navbar-brand">ShopEasy</a>
        <form class="search-form" action="/search" method="get">
            <input type="text" name="q" placeholder="Search products..." class="search-input"/>
            <button type="submit" class="btn btn-primary">Search</button>
        </form>
        <div class="nav-links">
            <a href="/products" class="nav-link">Products</a>
            <a href="/cart" class="nav-link">&#128722; Cart</a>
        </div>
    </div>
</nav>

<div class="container" style="margin-top: 2rem;">
    <h1>Checkout</h1>

    <div class="checkout-layout">
        <!-- Checkout Form -->
        <div class="checkout-form-section">
            <form th:action="@{/checkout}" th:object="${order}" method="post">
                <div class="form-section">
                    <h3>Contact Information</h3>
                    <div class="form-group">
                        <label for="customerName">Full Name *</label>
                        <input type="text" id="customerName" th:field="*{customerName}"
                               class="form-control" placeholder="John Doe" required/>
                    </div>
                    <div class="form-group">
                        <label for="customerEmail">Email Address *</label>
                        <input type="email" id="customerEmail" th:field="*{customerEmail}"
                               class="form-control" placeholder="john@example.com" required/>
                    </div>
                    <div class="form-group">
                        <label for="phone">Phone Number</label>
                        <input type="tel" id="phone" th:field="*{phone}"
                               class="form-control" placeholder="+1 234 567 8900"/>
                    </div>
                </div>

                <div class="form-section">
                    <h3>Shipping Address</h3>
                    <div class="form-group">
                        <label for="shippingAddress">Full Address *</label>
                        <textarea id="shippingAddress" th:field="*{shippingAddress}"
                                  class="form-control" rows="3"
                                  placeholder="123 Main St, City, State, ZIP" required></textarea>
                    </div>
                </div>

                <div class="form-section">
                    <h3>Payment</h3>
                    <div class="payment-notice">
                        <p>&#128274; This is a demo store. No real payment is processed.</p>
                    </div>
                    <div class="form-group">
                        <label>Card Number</label>
                        <input type="text" class="form-control" value="**** **** **** 1234" disabled/>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Expiry</label>
                            <input type="text" class="form-control" value="12/26" disabled/>
                        </div>
                        <div class="form-group">
                            <label>CVV</label>
                            <input type="text" class="form-control" value="***" disabled/>
                        </div>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary btn-lg btn-full">Place Order</button>
            </form>
        </div>

        <!-- Order Summary -->
        <div class="cart-summary">
            <h3>Order Summary</h3>
            <div th:each="item : ${cartItems}" class="summary-item">
                <span>
                    <span th:text="${item.product.name}">Product</span>
                    <small th:text="' x' + ${item.quantity}">x1</small>
                </span>
                <span th:text="'$' + ${#numbers.formatDecimal(item.subtotal, 1, 2)}">$0.00</span>
            </div>
            <hr/>
            <div class="summary-row">
                <span>Shipping:</span>
                <span class="free-shipping">FREE</span>
            </div>
            <div class="summary-total">
                <span>Total:</span>
                <span th:text="'$' + ${#numbers.formatDecimal(totalPrice, 1, 2)}">$0.00</span>
            </div>
        </div>
    </div>
</div>

<footer class="footer">
    <div class="container">
        <p>&copy; 2024 ShopEasy. All rights reserved.</p>
    </div>
</footer>

</body>
</html>
