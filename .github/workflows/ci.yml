name: CI - Test and Build

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  test-and-build:
    name: Test and Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
          cache-dependency-path: ecommerce/pom.xml

      - name: Run tests
        run: mvn test
        working-directory: ecommerce

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: ecommerce/target/surefire-reports/

      - name: Build JAR
        if: success()
        run: mvn package -DskipTests
        working-directory: ecommerce

      - name: Upload JAR artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ecommerce-jar
          path: ecommerce/target/*.jar
